<!DOCTYPE html>
<html>
<head>
<style>
  .video-container {
    position: relative;
    width: 100%;
    height: 80vh;
    overflow: hidden;
  }
  .video-container iframe {
    width: 100vw;
    height: 56.25vw;
    min-height: 100vh;
    min-width: 177.77vh;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/1-iR23K1LpQ?autoplay=1&mute=1&controls=0&showinfo=0&rel=0&loop=1&playlist=1-iR23K1LpQ" frameborder="0" allow="autoplay; encrypted-media"></iframe>
  </div>
</body>
</html>
